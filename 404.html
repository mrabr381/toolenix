<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Toolenix</title>
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script src="assets/js/theme.js"></script>
</head>
<body>
    <main style="padding: 8rem 0; text-align: center; min-height: 70vh; display: flex; align-items: center;">
        <div class="container">
            <h1 style="font-size: 6rem; font-weight: 800; line-height: 1; background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem;">404</h1>
            <h2 style="font-size: 2rem; margin-bottom: 1rem;">Looks like you're lost.</h2>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem;">The tool or page you are looking for doesn't exist or has been moved.</p>
            
            <div class="search-box glass" style="max-width: 500px; margin: 0 auto 3rem; padding: 0.5rem; display: flex; gap: 0.5rem;">
                <input type="text" placeholder="Search for a tool..." aria-label="Search tools" style="flex: 1; padding: 1rem; border: none; background: transparent; color: var(--text-main); font-size: 1rem; outline: none;">
                <button class="btn btn-primary" onclick="initSearch()">Search</button>
            </div>

            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Or try our most popular tools:</p>
            <div style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;">
                <a href="merge-pdf.html" class="btn btn-outline">Merge PDF</a>
                <a href="image-compressor.html" class="btn btn-outline">Image Compressor</a>
                <a href="json-formatter.html" class="btn btn-outline">JSON Formatter</a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
